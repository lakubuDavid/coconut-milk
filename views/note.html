<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coconut — Notes</title>
  <link rel="stylesheet" href="coconut://assets/style.css">
  <style>
    main { max-width: 640px; }
    textarea {
      width: 100%;
      min-height: 120px;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e4e4e7;
      padding: 0.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #a78bfa; }
    .toolbar {
      display: flex;
      gap: 0.5rem;
      margin: 0.75rem 0 1.5rem;
    }
    .note-list { list-style: none; }
    .note-item {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .note-item .text {
      flex: 1;
      font-size: 0.9rem;
      word-break: break-word;
      padding-right: 1rem;
    }
    .note-item .del {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 0.25rem;
    }
    .note-item .del:hover { color: #f87171; }
    .empty {
      color: #52525b;
      text-align: center;
      padding: 2rem;
      font-style: italic;
    }
    #note-stat {
      font-size: 0.85rem;
      color: #71717a;
      margin-left: auto;
    }
    @media (prefers-color-scheme: dark) {
      body.transparent-window { background: transparent !important; }
      .transparent-window .note-item,
      .transparent-window textarea { background: rgba(26,26,36,0.85); backdrop-filter: blur(12px); }
    }
  </style>
</head>
<body>
  <div class="titlebar" id="titlebar">
    <span class="app-name">🥥 Coconut</span>
    <button class="win-btn" onclick="doMinimize()">─</button>
    <button class="win-btn" onclick="doToggleFullscreen()">□</button>
    <button class="win-btn" onclick="doClose()">✕</button>
  </div>
  <nav>
    <a href="#" data-view="home">Home</a>
    <a href="#" class="active" data-view="note">Notes</a>
    <a href="#" data-view="commands">Commands</a>
  </nav>
  <main>
    <h2 style="font-size:1.5rem;font-weight:600;margin-bottom:1.5rem;">📝 Notes <span id="note-stat"></span></h2>

    <textarea id="note-input" placeholder="Write a note…"></textarea>
    <div class="toolbar">
      <button class="primary" id="add-btn">+ Add Note</button>
      <button id="clear-btn">🗑 Clear All</button>
    </div>

    <ul class="note-list" id="note-list">
      <li class="empty">No notes yet. Write one above ☝️</li>
    </ul>
  </main>

  <script src="coconut://assets/script.js"></script>
  <script>
    // --- Persistent notes store (Lua I/O) ---
    const notes = [];
    const listEl = document.getElementById('note-list');
    const inputEl = document.getElementById('note-input');
    const statEl = document.getElementById('note-stat');
    let saveTimeout = null;

    async function loadNotes() {
      try {
        await coconut.ready();
        const data = await coconut.call('notes_list', {});
        if (data && data.ok && data.data && Array.isArray(data.data)) {
          notes.length = 0;
          for (const n of data.data) notes.push(n);
          render();
        }
      } catch (e) {
        // No saved notes yet — start fresh
      }
    }

    async function saveNotes() {
      try {
        await coconut.call('notes_save', { notes: notes });
      } catch (e) {
        console.warn('[coconut] failed to save notes:', e);
      }
    }

    function scheduleSave() {
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveNotes, 300);
    }

    function render() {
      listEl.innerHTML = '';
      if (notes.length === 0) {
        listEl.innerHTML = '<li class="empty">No notes yet. Write one above ☝️</li>';
        statEl.textContent = '';
        return;
      }
      for (let i = 0; i < notes.length; i++) {
        const li = document.createElement('li');
        li.className = 'note-item';
        li.innerHTML = `<span class="text">${escapeHtml(notes[i])}</span>
                        <button class="del" data-idx="${i}">✕</button>`;
        listEl.appendChild(li);
      }
      document.querySelectorAll('.note-item .del').forEach(btn => {
        btn.onclick = () => {
          const idx = parseInt(btn.dataset.idx);
          notes.splice(idx, 1);
          render();
          scheduleSave();
        };
      });
      statEl.textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }

    document.getElementById('add-btn').onclick = () => {
      const text = inputEl.value.trim();
      if (!text) return;
      notes.push(text);
      inputEl.value = '';
      render();
      scheduleSave();
    };

    document.getElementById('clear-btn').onclick = () => {
      notes.length = 0;
      render();
      scheduleSave();
    };

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('add-btn').click();
      }
    });

    // --- Load notes on bridge ready ---
    loadNotes();
  </script>
</body>
</html>
