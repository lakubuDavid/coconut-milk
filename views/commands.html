<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coconut — Commands Test</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .cmd-card .params { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .cmd-card .params input, .cmd-card .params select { width: auto; flex: 1; min-width: 120px; }
    .cmd-card .params label { display: flex; align-items: center; gap: 0.3rem; color: #a1a1aa; font-size: 0.85rem; }
    p code { background: #2a2a3a; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="titlebar" id="titlebar">
    <span class="app-name">🥥 Coconut</span>
    <button class="win-btn" onclick="doMinimize()">─</button>
    <button class="win-btn" onclick="doToggleFullscreen()">□</button>
    <button class="win-btn" onclick="doClose()">✕</button>
  </div>
  <nav>
    <h1>🥥 Commands</h1>
    <a href="#" data-view="home">Home</a>
    <a href="#" data-view="note">Notes</a>
    <a href="#" data-view="commands" class="active">Commands</a>
    <a href="#" data-view="settings">Settings</a>
  </nav>
  <main>
    <p style="margin-bottom:1rem;color:#a1a1aa;">Test all registered Lua commands. Each card calls <code>coconut.call(name, params)</code>.</p>
    <div id="bridge-status" class="pending">waiting for bridge…</div>
    <div id="cards"></div>
  </main>

  <script src="assets/script.js"></script>
  <script>
    const commands = [
      { name: 'ping', desc: 'Returns "pong" — no params needed.', params: [], call: () => ({}) },
      { name: 'noop', desc: 'Does nothing, returns true.', params: [], call: () => ({}) },
      { name: 'greet', desc: 'Say hello.', params: [{ key: 'name', type: 'text', placeholder: 'name' }], call: (vals) => ({ name: vals.name || "world" }) },
      { name: 'sum', desc: 'Add two numbers.', params: [{ key: 'a', type: 'number', placeholder: 'first', default: 1 }, { key: 'b', type: 'number', placeholder: 'second', default: 2 }], call: (vals) => ({ a: Number(vals.a || 0), b: Number(vals.b || 0) }) },
      { name: 'login', desc: 'Authenticate (mock).', params: [{ key: 'username', type: 'text', placeholder: 'username' }, { key: 'password', type: 'password', placeholder: 'password' }, { key: 'remember', type: 'checkbox', label: 'Remember me' }], call: (vals) => ({ username: vals.username || "test", password: vals.password || "pass", remember: !!vals.remember }) },
      { name: 'search', desc: 'Full-text search.', params: [{ key: 'query', type: 'text', placeholder: 'query' }, { key: 'limit', type: 'number', placeholder: 'limit', default: 10 }, { key: 'offset', type: 'number', placeholder: 'offset', default: 0 }], call: (vals) => ({ query: vals.query || "", options: { limit: Number(vals.limit || 10), offset: Number(vals.offset || 0) } }) },
      { name: 'merge', desc: 'Deep-merge two tables.', params: [{ key: 'base', type: 'text', placeholder: 'base e.g. {"name":"a"}', default: '{"name":"a"}' }, { key: 'overrides', type: 'text', placeholder: 'overrides e.g. {"meta":{"x":1}}', default: '{"meta":{"x":1}}' }], call: (vals) => { try { return { base: JSON.parse(vals.base || '{}'), overrides: JSON.parse(vals.overrides || '{}') }; } catch(e) { throw new Error('Invalid JSON: ' + e.message); } } },
      { name: 'evaluate', desc: 'Evaluate expression.', params: [{ key: 'expr', type: 'text', placeholder: 'expr (string/number/bool)' }, { key: 'validate', type: 'checkbox', label: 'Valid?' }], call: (vals) => { let expr = vals.expr || "hello"; let num = Number(expr); return { expr: isNaN(num) ? expr : num, validate: function(v) { return true; } }; } }
    ];

    function buildCard(cmd) {
      const card = document.createElement('div'); card.className = 'card cmd-card';
      const title = document.createElement('h3'); title.textContent = cmd.name; card.appendChild(title);
      if (cmd.desc) { const d = document.createElement('div'); d.className = 'desc'; d.textContent = cmd.desc; card.appendChild(d); }
      const valStore = {};
      if (cmd.params.length > 0) {
        const paramsDiv = document.createElement('div'); paramsDiv.className = 'params';
        cmd.params.forEach(p => {
          if (p.type === 'checkbox') {
            const label = document.createElement('label');
            const cb = document.createElement('input'); cb.type = 'checkbox';
            cb.onchange = () => { valStore[p.key] = cb.checked; };
            label.appendChild(cb); label.appendChild(document.createTextNode(p.label || p.key));
            paramsDiv.appendChild(label);
          } else {
            const input = document.createElement('input');
            input.type = p.type || 'text'; input.placeholder = p.placeholder || p.key;
            if (p.default !== undefined) input.value = p.default;
            input.oninput = () => { valStore[p.key] = input.value; };
            paramsDiv.appendChild(input);
          }
        });
        card.appendChild(paramsDiv);
      }
      const btn = document.createElement('button'); btn.textContent = `▶ ${cmd.name}`; card.appendChild(btn);
      const result = document.createElement('div'); result.className = 'result-msg'; result.style.display = 'none'; card.appendChild(result);
      btn.onclick = async () => {
        result.style.display = 'block'; result.textContent = 'calling...'; result.className = 'result-msg';
        try {
          const params = cmd.call(valStore);
          const data = await coconut.call(cmd.name, params);
          result.textContent = '→ ' + JSON.stringify(data, null, 2);
        } catch (err) {
          result.textContent = '✗ ' + (err.message || JSON.stringify(err));
          result.className = 'result-msg error';
        }
      };
      return card;
    }

    (async () => {
      await coconut.ready();
      const status = document.getElementById('bridge-status');
      status.textContent = 'connected'; status.className = 'connected';
      const container = document.getElementById('cards');
      commands.forEach(cmd => container.appendChild(buildCard(cmd)));
    })();
  </script>
</body>
</html>
