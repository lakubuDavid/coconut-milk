<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coconut — Home</title>
  <link rel="stylesheet" href="coconut://assets/style.css">
</head>
<body>
  <!-- Title bar (drag region for frameless windows) -->
  <div class="titlebar" id="titlebar">
    <span class="app-name">🥥 Coconut</span>
    <button class="win-btn" onclick="doMinimize()">─</button>
    <button class="win-btn" onclick="doToggleFullscreen()">□</button>
    <button class="win-btn" onclick="doClose()">✕</button>
  </div>
  <nav></nav>
  <script>document.body.dataset.view = 'home';</script>
  <main>
    <section class="hero" style="margin-bottom:2rem;">
      <h2 style="font-size:2rem;font-weight:700;margin-bottom:0.5rem;">Welcome to Coconut</h2>
      <p style="color:#a1a1aa;line-height:1.6;">
        A minimal Lua desktop UI framework — inspired by Tauri, powered by WKWebView.
        This is the built-in home view loaded from <code>views/home.html</code>.
      </p>
    </section>

    <div class="card">
      <h3>🧮 Counter</h3>
      <div id="counter-display" style="font-size:2.5rem;font-weight:700;color:#a78bfa;text-align:center;margin:1rem 0;">0</div>
      <div style="display:flex;gap:0.5rem;justify-content:center;">
        <button id="dec-btn">− Decrement</button>
        <button id="inc-btn">+ Increment</button>
        <button id="reset-btn">↺ Reset</button>
      </div>
    </div>

    <div class="card">
      <h3>🔗 Bridge Status</h3>
      <p style="margin-bottom:0.5rem;">Frontend-to-Lua bridge:</p>
      <p><span id="bridge-status" class="pending">waiting…</span></p>
      <button id="ping-btn" style="margin-top:0.5rem;">📡 Ping Lua</button>
    </div>
  </main>

  <script src="coconut://assets/script.js"></script>
  <script>
    // --- Local counter (no bridge needed) ---
    let count = 0;
    const display = document.getElementById('counter-display');
    document.getElementById('inc-btn').onclick = () => { display.textContent = ++count; };
    document.getElementById('dec-btn').onclick = () => { display.textContent = --count; };
    document.getElementById('reset-btn').onclick = () => { count = 0; display.textContent = count; };

    // --- Bridge ping ---
    document.getElementById('ping-btn').onclick = async () => {
      const status = document.getElementById('bridge-status');
      try {
        const result = await coconut.call('ping', {});
        status.textContent = 'pong: ' + JSON.stringify(result);
        status.className = 'connected';
      } catch (err) {
        status.textContent = 'error: ' + (err.message || JSON.stringify(err));
        status.className = 'pending';
      }
    };
  </script>
</body>
</html>
